global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alerting rules evaluated by Prometheus.
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Prometheus scrapes its own metrics.
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Scrape both blue and green application instances. The `instance` label
  # distinguishes them; an instance being down sets up{job="app"} == 0.
  - job_name: app
    metrics_path: /metrics
    static_configs:
      - targets: ['app-blue:3000']
        labels:
          slot: blue
      - targets: ['app-green:3000']
        labels:
          slot: green
