name: devops-final

# ===========================================================================
# Full production-like stack:
#   app-blue / app-green  - two instances of the same image (blue-green)
#   proxy                 - routes :8000 to the active instance (active_env.json)
#   prometheus + grafana  - metrics & dashboards
#   elasticsearch+logstash+kibana (ELK) - structured JSON log pipeline
# Bring everything up with a single command:  docker compose up -d --build
# ===========================================================================

x-app-logging: &gelf-logging
  driver: gelf
  options:
    gelf-address: "udp://host.docker.internal:12201"

services:
  # -------------------------------------------------------------------------
  # Application — BLUE instance
  # -------------------------------------------------------------------------
  app-blue:
    build: .
    image: devops-final-app:latest
    container_name: app-blue
    environment:
      - PORT=3000
      - APP_ENV=blue
      - SERVICE_NAME=app-blue
      - NEW_UI_ENABLED=${NEW_UI_ENABLED:-false}
    ports:
      - "8001:3000"
    logging: *gelf-logging
    depends_on:
      - logstash
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Application — GREEN instance
  # -------------------------------------------------------------------------
  app-green:
    build: .
    image: devops-final-app:latest
    container_name: app-green
    environment:
      - PORT=3000
      - APP_ENV=green
      - SERVICE_NAME=app-green
      - NEW_UI_ENABLED=${NEW_UI_ENABLED:-false}
    ports:
      - "8002:3000"
    logging: *gelf-logging
    depends_on:
      - logstash
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Reverse proxy — single public entrypoint, routes to the active instance.
  # Reads config/active_env.json (mounted), switched by deploy.py / rollback.py.
  # -------------------------------------------------------------------------
  proxy:
    build: .
    image: devops-final-app:latest
    container_name: proxy
    command: ["node", "proxy.js"]
    environment:
      - PROXY_PORT=8000
      - BLUE_TARGET=http://app-blue:3000
      - GREEN_TARGET=http://app-green:3000
      - CONFIG_FILE=/usr/src/app/config/active_env.json
    ports:
      - "8000:8000"
    volumes:
      - ./config:/usr/src/app/config:ro
    depends_on:
      - app-blue
      - app-green
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Metrics — Prometheus
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Dashboards & alert visibility — Grafana
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Logs — Elasticsearch + Logstash + Kibana (ELK)
  # -------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.1
    container_name: logstash
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.monitoring.enabled=false
    ports:
      - "12201:12201/udp"
      - "5044:5044"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      - elasticsearch
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.1
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    restart: unless-stopped

volumes:
  grafana-data:
  elasticsearch-data:
