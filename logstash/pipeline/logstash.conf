input {
  # Receives container stdout shipped by Docker's gelf logging driver.
  # Each application log line arrives as the GELF "message" field.
  gelf {
    port => 12201
  }
}

filter {
  # The application writes one JSON object per line (pino). Parse it so the
  # individual fields (level, service, method, path, statusCode, message,
  # timestamp) become structured and searchable instead of one raw text blob.
  json {
    source => "message"
    target => "app"
    skip_on_invalid_json => true
  }

  # Promote the application's own ISO timestamp to the event @timestamp.
  if [app][timestamp] {
    date {
      match => ["[app][timestamp]", "ISO8601"]
      target => "@timestamp"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "app-logs-%{+YYYY.MM.dd}"
  }

  # Echo parsed events to Logstash stdout for easy debugging
  # (`docker compose logs logstash`).
  stdout {
    codec => rubydebug
  }
}
